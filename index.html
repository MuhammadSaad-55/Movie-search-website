<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie Search Website</title>
    <link rel="shortcut icon" href="images/favicon.ico" type="image/x-icon" />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="navbar">
      <a href="index.html" style="text-decoration: none">
        <h1 class="logo">
          <img src="images/logo.png" alt="logo" /><span>SaadX</span>
        </h1>
      </a>
      <div class="nav-right">
        <select id="genreFilter">
          <option value="">All Genres</option>
        </select>
        <div class="search-box" id="searchBox">
          <button id="searchIconBtn">
            <img src="images/search_icon.svg" alt="search_icon" />
          </button>
          <input type="text" id="searchInput" placeholder="Search movies..." />
          <button id="searchBtn">Search</button>
        </div>
        <button id="favBtn">❤️ Favourites</button>
      </div>
    </nav>

    <div class="hero" id="hero">
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <span class="hero-badge">Trending #1</span>
        <h2 id="heroTitle">Loading...</h2>
        <p id="heroOverview"></p>
        <div class="hero-btns">
          <button id="heroTrailerBtn">▶ Watch Trailer</button>
          <button id="heroFavBtn">+ My List</button>
        </div>
      </div>
    </div>

    <section class="movies-section">
      <h2 class="section-title">🎬 Popular Movies</h2>
      <div id="moviesGrid" class="movies-grid"></div>
    </section>

    <footer class="footer">
      <div class="footer-content">
        <h2 class="footer-logo">MOVIE SEARCH APP</h2>
        <p class="footer-text">Powered by TMDB API</p>
        <div class="footer-links">
          <a href="#">About</a>
          <a href="mailto:youremail@gmail.com">Mail</a>
          <a href="https://github.com/Saadfadi" target="_blank">GitHub</a>
        </div>
        <p class="footer-copyright">
          © 2026 Movie Search App. Built for learning purposes.
        </p>
      </div>
    </footer>

    <div id="trailerModal" class="modal hidden">
      <div class="modal-content">
        <span id="closeTrailer">✕</span>
        <iframe id="trailerFrame" frameborder="0" allowfullscreen></iframe>
      </div>
    </div>

    <script src="JS/config.js"></script>
    <script src="JS/movies.js"></script>
    <script src="JS/trailer.js"></script>
    <script src="JS/favourites.js"></script>
    <script src="JS/responsive.js"></script>
  </body>
</html>
